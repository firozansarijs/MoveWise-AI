<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveWise AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>MoveWise-Ai</nav>
    <div class="main">
<div class="information">
    <h3>AI Relocation Planner</h3>
      <form>
        <div class="dropdown">
        <select class="country-select">
        <option>Select Country</option>
      </select>
        <br>
         <select name="dropdown" class="city-select">
          <option>Delhi</option>
          <option>London</option>
          <option>Melbourne</option>
          <option>Los Angeles</option>
         </select>
         <br>
        <input type="text" placeholder="Monthly Budget e.g. $1800" class="budget-input">
        <br>
       <select name="dropdown" class="purpose">
     <option>Student</option>
     <option>Working Professional</option>
     <option>Tourist</option>
     <option>Family</option>
       </select>
        </div>
    <button type="button" class="analyze-btn">
    ✨ Analyze with AI
</button> 
    </div>
      </form>
    <div class="result-card">
            <h3>AI Recommendation</h3>
           <p>🏠 Housing:  <span class="housing">------</span></p>
           <p>🚌 Transport:  <span class="transport">------</span></p>
           <p>🍜 Food:  <span class="food">------</span></p>
           <p>💰 Savings:  <span class="savings">------</span></p>
           <p>💡 Advice:  <span class="advice">------</span></p>
           <p>📊 Estimated Cost:  <span class="estimated-cost">------</span></p>
    </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
